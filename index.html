// ─── DB OPERATIONS ────────────────────────────────────────────────────────────
const DB = {
  async getMembers() {
    if (!sb) return MOCK_MEMBERS;
    try {
      const { data, error } = await sb.from('profiles').select('*').eq('approved', true).order('name');
      if (error) throw error;
      return data || [];
    } catch(e) { console.warn('getMembers fallback:', e); return MOCK_MEMBERS; }
  },

  async getMemories() {
    if (!sb) return MOCK_MEMORIES;
    try {
      const { data, error } = await sb
        .from('memories')
        .select('*, profiles!memories_author_id_fkey(name, emoji)')
        .eq('approved', true)
        .order('created_at', { ascending: false });
      if (error) throw error;
      return (data || []).map(m => ({
        ...m,
        author: m.profiles?.name || 'Anonimo',
        author_emoji: m.profiles?.emoji || '😊'
      }));
    } catch(e) { console.warn('getMemories fallback:', e); return MOCK_MEMORIES; }
  },

  async addMemory(memoryData, photoFile, userId) {
    if (!sb) return { error: 'Demo mode — configura Supabase per salvare ricordi.' };
    if (!userId) return { error: 'Devi essere loggato.' };
    try {
      // Assicura che il profilo sia approvato (necessario per la policy RLS)
      // Usa UPDATE (non upsert) per non sovrascrivere nome e altri campi
      try {
        await sb.from('profiles').update({ approved: true }).eq('id', userId);
      } catch(_) {}

      let photo_url = null;
      if (photoFile) {
        try {
          // Comprimi e converti in base64 (nessun bucket storage necessario)
          photo_url = await new Promise((resolve) => {
            const img = new Image();
            const reader = new FileReader();
            reader.onload = (e) => {
              img.onload = () => {
                const MAX = 900;
                let w = img.width, h = img.height;
                if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.75));
              };
              img.onerror = () => resolve(null);
              img.src = e.target.result;
            };
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(photoFile);
          });
        } catch(uploadErr) { photo_url = null; }
      }

      const timeout = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('Timeout: riprova tra qualche secondo')), 10000)
      );
      const insert = sb.from('memories').insert({
        author_id: userId,
        title: memoryData.title,
        text: memoryData.text,
        date_label: memoryData.date_label,
        tag: memoryData.tag,
        photo_url,
        approved: true
      }).select();
      const { error } = await Promise.race([insert, timeout]);
      if (error) return { error: error.message || JSON.stringify(error) };
      return { success: true };
    } catch(e) { return { error: e.message || 'Errore sconosciuto' }; }
  },

  async register(email, password, profile) {
    if (!sb) return { error: 'Demo mode — configura Supabase per registrarti.' };
    try {
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (data.user) {
        await sb.from('profiles').insert({
          id: data.user.id,
          name: profile.name,
          emoji: profile.emoji,
          city: profile.city,
          country: profile.country,
          job: profile.job,
          years: profile.years,
          bio: profile.bio,
          approved: false
        });
      }
      return { success: true };
    } catch(e) { return { error: e.message }; }
  },

  async login(email, password) {
    if (!sb) return { error: 'Demo mode — configura Supabase.' };
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      return { success: true, user: data.user };
    } catch(e) { return { error: e.message }; }
  },

  async logout() {
    if (!sb) return;
    await sb.auth.signOut();
    window.location.href = '/';
  },

  async getUser() {
    if (!sb) return null;
    try {
      const { data } = await sb.auth.getUser();
      return data?.user || null;
    } catch(e) { return null; }
  },

  async getUserProfile(userId) {
    if (!sb || !userId) return null;
    try {
      const { data } = await sb.from('profiles').select('*').eq('id', userId).single();
      return data;
    } catch(e) { return null; }
  },

  async toggleLike(memoryId, userId) {
    if (!sb) return { error: 'Demo mode' };
    try {
      const { data: existing } = await sb
        .from('memory_likes')
        .select('*')
        .eq('user_id', userId)
        .eq('memory_id', memoryId)
        .single();

      if (existing) {
        await sb.from('memory_likes').delete().eq('user_id', userId).eq('memory_id', memoryId);
        await sb.rpc('decrement_likes', { memory_id: memoryId });
        return { liked: false };
      } else {
        await sb.from('memory_likes').insert({ user_id: userId, memory_id: memoryId });
        await sb.rpc('increment_likes', { memory_id: memoryId });
        return { liked: true };
      }
    } catch(e) { return { error: e.message }; }
  },

  async updateProfile(userId, data) {
    if (!sb || !userId) return { error: 'Non autenticato' };
    try {
      const { error } = await sb.from('profiles').update(data).eq('id', userId);
      if (error) return { error: error.message };
      return { success: true };
    } catch(e) { return { error: e.message }; }
  },

  async deleteMemory(memoryId) {

      if (error) return { error: error.message };

  },

  async getUserLikes(userId) {

  async getPendingProfiles() {

  async approveProfile(userId) {
    if (!sb) return { error: 'No connection' };

      if (error) throw error;

  async rejectProfile(userId) {
    if (!sb) return { error: 'No connection' };

      const { error } = await sb.from('profiles').delete().eq('id', userId);

  async getPendingMemories() {
    if (!sb) return [];

        .from('memories')

        .eq('approved', false)

      return (data || []).map(m => ({ ...m, author: m.profiles?.name || 'Anonimo', author_emoji: m.profiles?.emoji || '😊' }));
    } catch(e) { console.warn('getPendingMemories:', e); return []; }

    if (!sb) return { error: 'No connection' };

      if (error) throw error;

    } catch(e) { return { error: e.message }; }

      if (error) throw error;
      return { success: true };
    } catch(e) { return { error: e.message }; }
  }
};

// ─── MAPPA LEAFLET ────────────────────────────────────────────────────────────
const LeafletMap = ({ members }) => {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef([]);

  useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;

    const map = L.map(mapRef.current, {
      center: [20, 10],
      zoom: 2,
      scrollWheelZoom: false,
      zoomControl: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18
    }).addTo(map);

    mapInstanceRef.current = map;

    return () => {
      if (mapInstanceRef.current) {
        mapInstanceRef.current.remove();
        mapInstanceRef.current = null;
      }
    };
  }, []);

  useEffect(() => {
    if (!mapInstanceRef.current || !members.length) return;

    // Rimuovi marker precedenti
    markersRef.current.forEach(m => m.remove());
    markersRef.current = [];

    members.forEach(member => {
      if (!member.lat || !member.lng) return;
      const icon = L.divIcon({
        html: `<div style="width:36px;height:36px;border-radius:50%;background:#fff;border:3px solid #C8A000;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.25);cursor:pointer;">${member.emoji || '😊'}</div>`,
        className: '',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      });

      const marker = L.marker([member.lat, member.lng], { icon })
        .addTo(mapInstanceRef.current)
        .bindPopup(`
          <div style="font-family:'Segoe UI',Arial,sans-serif;min-width:180px;">
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;">
              <div style="font-size:28px;">${member.emoji || '😊'}</div>
              <div>
                <div style="font-weight:700;font-size:14px;color:#1A1A1A;">${member.name}</div>
                <div style="font-size:12px;color:#888;">📍 ${member.city || ''}, ${member.country || ''}</div>
              </div>
            </div>
            ${member.job ? `<div style="font-size:12px;color:#0D3A6E;font-weight:600;margin-bottom:4px;">💼 ${member.job}</div>` : ''}
            ${member.years ? `<div style="font-size:11px;color:#C8A000;font-weight:500;margin-bottom:6px;">☕ Al Cafè: ${member.years}</div>` : ''}
            ${member.bio ? `<div style="font-size:12px;color:#555;line-height:1.5;font-style:italic;">"${member.bio.substring(0, 100)}${member.bio.length > 100 ? '...' : ''}"</div>` : ''}
          </div>
        `, { maxWidth: 260 });

      markersRef.current.push(marker);
    });

    // Aggiungi pin speciale per Vietri
    const vietriIcon = L.divIcon({
      html: `<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#0D3A6E,#1B64C8);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(13,58,110,0.5);border:3px solid #D0E4FF;">☕</div>`,
      className: '',
      iconSize: [44, 44],
      iconAnchor: [22, 22]
    });
    const vietriMarker = L.marker([40.668, 14.730], { icon: vietriIcon })
      .addTo(mapInstanceRef.current)
      .bindPopup(`<div style="font-family:'Segoe UI',Arial,sans-serif;text-align:center;padding:8px;"><div style="font-size:24px;margin-bottom:6px;">☕</div><div style="font-weight:800;font-size:15px;color:#0D3A6E;font-family:Georgia,serif;">Cafè degli Artisti</div><div style="font-size:12px;color:#888;margin-top:4px;">Vietri sul Mare, SA<br>1990–2005</div></div>`, { maxWidth: 200 });
    markersRef.current.push(vietriMarker);

  }, [members]);

  return (
    <div ref={mapRef} style={{ width: '100%', height: 450, borderRadius: '20px', overflow: 'hidden', boxShadow: '0 4px 20px rgba(0,0,0,0.1)', zIndex: 1 }} />
  );
};

// ─── AUTH MODAL ───────────────────────────────────────────────────────────────
const AuthModal = ({ mode, onClose, onSuccess }) => {
  const [step, setStep] = useState(1);
  const [isLogin, setIsLogin] = useState(mode === 'login');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [form, setForm] = useState({
    email: '', password: '', name: '', city: '', country: 'Italia', job: '', years: '', emoji: '😊', bio: ''
  });
  const emojis = ['😊', '🎸', '💃', '🎨', '🍕', '📚', '🏄', '☕', '🎭', '🌊', '🎤', '👨‍🎨', '🎬', '🌹', '⚽', '🎲'];

  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleLogin = async () => {
    if (!form.email || !form.password) { setError('Inserisci email e password'); return; }
    setLoading(true); setError('');
    const res = await DB.login(form.email, form.password);
    setLoading(false);
    if (res.error) setError(res.error);
    else { onSuccess('login'); onClose(); }
  };

  const handleRegister = async () => {
    if (!form.email || !form.password || !form.name) { setError('Compila tutti i campi obbligatori'); return; }
    if (form.password.length < 6) { setError('La password deve avere almeno 6 caratteri'); return; }
    setLoading(true); setError('');
    const res = await DB.register(form.email, form.password, {
      name: form.name, emoji: form.emoji, city: form.city, country: form.country,
      job: form.job, years: form.years, bio: form.bio
    });
    setLoading(false);
    if (res.error) setError(res.error);
    else { onSuccess('register'); onClose(); }
  };

  const inputStyle = { width: '100%', padding: '11px 14px', borderRadius: '10px', border: '2px solid #C5D5EE', fontSize: '15px', outline: 'none', background: '#F5F9FF', boxSizing: 'border-box' };

  return (

      <div style={{ background: '#fff', borderRadius: '24px', width: '100%', maxWidth: 480, maxHeight: '90vh', overflow: 'auto', padding: '32px', boxShadow: '0 20px 60px rgba(0,0,0,0.25)' }}>

        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px' }}>
          <div>
            <h2 style={{ margin: 0, fontFamily: 'Georgia, serif', fontSize: '24px', color: '#0D3A6E' }}>
              {isLogin ? '☕ Bentornato' : '✨ Entra nella Family'}
            </h2>
            <p style={{ margin: '4px 0 0', fontSize: '13px', color: '#888' }}>
              {isLogin ? 'Accedi al tuo account' : 'Registrazione gratuita · Solo chi conosce davvero il Cafè'}
            </p>
          </div>
          <button onClick={onClose} style={{ background: '#F0F5FF', border: 'none', borderRadius: '50%', width: 36, height: 36, fontSize: '18px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
        </div>

        {!CONFIGURED && (
          <div style={{ background: '#EEF4FF', border: '1px solid #C8A00044', borderRadius: '10px', padding: '12px 14px', marginBottom: '20px', fontSize: '13px', color: '#1A4A8A' }}>
            ⚡ Modalità Demo — la registrazione non verrà salvata. Configura Supabase per attivare l'auth reale.
          </div>
        )}

        {error && (
          <div style={{ background: '#EEF2FF', border: '1px solid #1B64C844', borderRadius: '10px', padding: '10px 14px', marginBottom: '16px', fontSize: '13px', color: '#0A2A6E' }}>
            ⚠️ {error}
          </div>
        )}

        {/* Login */}
        {isLogin && (
          <div>
            <div style={{ marginBottom: 16 }}>
              <label style={labelStyle}>Email</label>
              <input type="email" value={form.email} onChange={e => update('email', e.target.value)} placeholder="la tua email" style={inputStyle} />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={labelStyle}>Password</label>
              <input type="password" value={form.password} onChange={e => update('password', e.target.value)} placeholder="••••••••" style={inputStyle} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
            </div>
            <button onClick={handleLogin} disabled={loading} style={{ width: '100%', background: loading ? '#ccc' : 'linear-gradient(135deg, #0D3A6E, #1B64C8)', color: '#fff', border: 'none', borderRadius: '50px', padding: '14px', fontSize: '16px', fontWeight: 700, cursor: loading ? 'default' : 'pointer', transition: 'all 0.2s' }}>
              {loading ? 'Accesso in corso...' : 'Accedi ☕'}
            </button>
            <div style={{ textAlign: 'center', marginTop: 20, fontSize: 14, color: '#888' }}>
              Non sei ancora della Family?{' '}
              <button onClick={() => { setIsLogin(false); setError(''); }} style={{ background: 'none', border: 'none', color: '#C8A000', fontWeight: 700, cursor: 'pointer', padding: 0, fontSize: 14 }}>Registrati</button>
            </div>
          </div>
        )}

        {/* Register */}
        {!isLogin && (
          <div>
            {/* Steps indicator */}
            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              {[1, 2].map(s => (
                <div key={s} style={{ flex: 1, height: 4, borderRadius: 4, background: step >= s ? '#C8A000' : '#C5D5EE', transition: 'all 0.3s' }} />
              ))}
            </div>

            {step === 1 && (
              <div>
                <h3 style={{ color: '#0D3A6E', fontSize: 17, margin: '0 0 16px' }}>Passo 1 — Chi sei oggi</h3>
                {[['Nome e cognome *', 'name', 'text', 'Es. Mario Rossi'],
                  ['Email *', 'email', 'email', 'la tua email'],
                  ['Password * (min. 6 caratteri)', 'password', 'password', '••••••••'],
                  ['Città attuale', 'city', 'text', 'Dove vivi ora?'],
                  ['Paese', 'country', 'text', 'Es. Italia'],
                  ['Professione', 'job', 'text', 'Cosa fai oggi?']
                ].map(([label, key, type, ph]) => (
                  <div key={key} style={{ marginBottom: 14 }}>
                    <label style={labelStyle}>{label}</label>
                    <input type={type} placeholder={ph} value={form[key]} onChange={e => update(key, e.target.value)} style={inputStyle} />
                  </div>
                ))}
                <div style={{ marginBottom: 20 }}>
                  <label style={labelStyle}>Il tuo emoji avatar</label>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    {emojis.map(e => (
                      <button key={e} onClick={() => update('emoji', e)} style={{ width: 42, height: 42, borderRadius: '50%', border: `3px solid ${form.emoji === e ? '#C8A000' : '#C5D5EE'}`, background: form.emoji === e ? '#EEF4FF' : '#fff', fontSize: 20, cursor: 'pointer', transition: 'all 0.15s' }}>
                        {e}
                      </button>
                    ))}
                  </div>
                </div>
                <button onClick={() => { if (!form.name || !form.email || !form.password) { setError('Compila i campi obbligatori (*)'); return; } setError(''); setStep(2); }} style={{ width: '100%', background: 'linear-gradient(135deg, #0D3A6E, #1555A0)', color: '#fff', border: 'none', borderRadius: '50px', padding: '14px', fontSize: '16px', fontWeight: 700, cursor: 'pointer' }}>
                  Avanti →
                </button>
              </div>
            )}

            {step === 2 && (
              <div>
                <h3 style={{ color: '#0D3A6E', fontSize: 17, margin: '0 0 16px' }}>Passo 2 — Il tuo Cafè</h3>
                <div style={{ marginBottom: 14 }}>
                  <label style={labelStyle}>Anni di frequentazione</label>
                  <input type="text" placeholder="Es. 1995–2002" value={form.years} onChange={e => update('years', e.target.value)} style={inputStyle} />
                </div>
                <div style={{ marginBottom: 16 }}>
                  <label style={labelStyle}>Il tuo ricordo del Cafè</label>
                  <textarea placeholder="Cosa ti è rimasto dentro di quegli anni? Un momento, una persona, una sensazione..." value={form.bio} onChange={e => update('bio', e.target.value)} style={{ ...inputStyle, minHeight: 110, resize: 'vertical' }} />
                </div>
                <div style={{ background: '#EEF4FF', borderRadius: '10px', padding: '10px 14px', marginBottom: 20, fontSize: '13px', color: '#0D3A6E', lineHeight: 1.5 }}>
                  ☕ La tua registrazione sarà approvata da Carlo. Solo chi conosce davvero il Cafè entra nella Family.
                </div>
                <div style={{ display: 'flex', gap: 10 }}>
                  <button onClick={() => setStep(1)} style={{ flex: 1, background: '#F5F9FF', color: '#0D3A6E', border: '2px solid #C5D5EE', borderRadius: '50px', padding: '13px', fontSize: '15px', fontWeight: 600, cursor: 'pointer' }}>
                    ← Indietro
                  </button>
                  <button onClick={handleRegister} disabled={loading} style={{ flex: 2, background: loading ? '#ccc' : 'linear-gradient(135deg, #C8A000, #1B64C8)', color: '#fff', border: 'none', borderRadius: '50px', padding: '13px', fontSize: '15px', fontWeight: 700, cursor: loading ? 'default' : 'pointer' }}>
                    {loading ? 'Invio in corso...' : 'Invia richiesta ✨'}
                  </button>
                </div>
              </div>
            )}

            <div style={{ textAlign: 'center', marginTop: 20, fontSize: 14, color: '#888' }}>
              Hai già un account?{' '}
              <button onClick={() => { setIsLogin(true); setError(''); setStep(1); }} style={{ background: 'none', border: 'none', color: '#C8A000', fontWeight: 700, cursor: 'pointer', padding: 0, fontSize: 14 }}>Accedi</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── EDIT PROFILE MODAL ───────────────────────────────────────────────────────
const EditProfileModal = ({ user, userProfile, onClose, onSaved }) => {
  const [form, setForm] = useState({
    name: userProfile?.name || '',
    emoji: userProfile?.emoji || '😊',
    city: userProfile?.city || '',
    country: userProfile?.country || '',
    job: userProfile?.job || '',
    years: userProfile?.years || '',
    bio: userProfile?.bio || '',
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [locating, setLocating] = useState(false);
  const up = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const inp = { width: '100%', padding: '10px 13px', borderRadius: '10px', border: '2px solid #C5D5EE', fontSize: '14px', outline: 'none', background: '#F5F9FF', boxSizing: 'border-box' };
  const lbl = { display: 'block', fontSize: '12px', fontWeight: 600, color: '#0D3A6E', marginBottom: '5px' };

  const getLocation = () => {
    if (!navigator.geolocation) { setError('Geolocalizzazione non disponibile'); return; }
    setLocating(true);
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        // Reverse geocode with nominatim
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
          const d = await r.json();
          const city = d.address?.city || d.address?.town || d.address?.village || '';
          const country = d.address?.country || '';
          setForm(f => ({ ...f, city, country }));
          await DB.updateProfile(user.id, { lat: parseFloat(lat), lng: parseFloat(lng), city, country });
        } catch(_) {}
        setLocating(false);
      },
      () => { setError('Posizione non rilevata'); setLocating(false); }
    );
  };

  const handleSave = async () => {
    if (!form.name) { setError('Il nome è obbligatorio'); return; }
    setLoading(true); setError('');
    const res = await DB.updateProfile(user.id, form);
    setLoading(false);
    if (res.error) setError(res.error);
    else { onSaved(); onClose(); }
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: '#fff', borderRadius: 24, width: '100%', maxWidth: 480, maxHeight: '90vh', overflow: 'auto', padding: 28, boxShadow: '0 20px 60px rgba(0,0,0,0.25)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h2 style={{ margin: 0, fontFamily: 'Georgia, serif', fontSize: 20, color: '#0D3A6E' }}>✏️ Modifica profilo</h2>
          <button onClick={onClose} style={{ background: '#F0F5FF', border: 'none', borderRadius: '50%', width: 34, height: 34, fontSize: 18, cursor: 'pointer' }}>×</button>
        </div>
        {error && <div style={{ background: '#FFEEEE', borderRadius: 10, padding: '8px 12px', marginBottom: 14, fontSize: 13, color: '#cc0000' }}>⚠️ {error}</div>}
        <div style={{ marginBottom: 12 }}>
          <label style={lbl}>Nome *</label>
          <input value={form.name} onChange={e => up('name', e.target.value)} style={inp} />
        </div>
        <div style={{ marginBottom: 12 }}>
          <label style={lbl}>Emoji</label>
          <input value={form.emoji} onChange={e => up('emoji', e.target.value)} style={{ ...inp, width: 80 }} maxLength={2} />
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
          <div><label style={lbl}>Città</label><input value={form.city} onChange={e => up('city', e.target.value)} style={inp} placeholder="Es. Napoli" /></div>
          <div><label style={lbl}>Paese</label><input value={form.country} onChange={e => up('country', e.target.value)} style={inp} placeholder="Es. Italia" /></div>
        </div>
        <button onClick={getLocation} disabled={locating} style={{ width: '100%', background: '#F0F5FF', border: '2px solid #C5D5EE', borderRadius: 10, padding: '10px', fontSize: 13, cursor: 'pointer', marginBottom: 12, color: '#0D3A6E', fontWeight: 600 }}>
          {locating ? '📍 Rilevamento...' : '📍 Usa la mia posizione attuale (per la mappa)'}
        </button>
        <div style={{ marginBottom: 12 }}>
          <label style={lbl}>Lavoro</label>
          <input value={form.job} onChange={e => up('job', e.target.value)} style={inp} placeholder="Es. Musicista" />
        </div>
        <div style={{ marginBottom: 12 }}>
          <label style={lbl}>Anni al Cafè</label>
          <input value={form.years} onChange={e => up('years', e.target.value)} style={inp} placeholder="Es. 1995–2002" />
        </div>
        <div style={{ marginBottom: 18 }}>
          <label style={lbl}>Bio</label>
          <textarea value={form.bio} onChange={e => up('bio', e.target.value)} style={{ ...inp, height: 80, resize: 'vertical' }} placeholder="Qualcosa su di te..." />
        </div>
        <button onClick={handleSave} disabled={loading} style={{ width: '100%', background: loading ? '#ccc' : 'linear-gradient(135deg, #C8A000, #1B64C8)', color: '#fff', border: 'none', borderRadius: 50, padding: 13, fontSize: 15, fontWeight: 700, cursor: loading ? 'default' : 'pointer' }}>
          {loading ? 'Salvataggio...' : 'Salva profilo'}
        </button>
      </div>
    </div>
  );
};

// ─── PAGE: MURO DEI RICORDI ───────────────────────────────────────────────────
const PageMuro = ({ user, userProfile, onOpenAuth }) => {
  const [memories, setMemories] = useState([]);
  const [likedIds, setLikedIds] = useState([]);
  const [filter, setFilter] = useState('tutti');
  const [loading, setLoading] = useState(true);
  const [showAddModal, setShowAddModal] = useState(false);
  const [lightbox, setLightbox] = useState(null);
  const tags = ['tutti', 'musica', 'rituale', 'atmosfera', 'persone', 'notte', 'Vietri', 'altro'];

  useEffect(() => {
    (async () => {
      setLoading(true);
      const [mems, liked] = await Promise.all([
        DB.getMemories(),
        user ? DB.getUserLikes(user.id) : []
      ]);
      setMemories(mems);
      setLikedIds(liked);
      setLoading(false);
    })();
  }, [user]);

  const filtered = filter === 'tutti' ? memories : memories.filter(m => m.tag === filter);

  const handleLike = async (memoryId) => {
    if (!user) { onOpenAuth('login'); return; }
    const isLiked = likedIds.includes(memoryId);
    setLikedIds(prev => isLiked ? prev.filter(id => id !== memoryId) : [...prev, memoryId]);
    setMemories(prev => prev.map(m => m.id === memoryId ? { ...m, likes: m.likes + (isLiked ? -1 : 1) } : m));
    await DB.toggleLike(memoryId, user.id);
  };

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
          <div>
            <h2 style={{ fontFamily: 'Georgia, serif', fontSize: 28, color: '#0D3A6E', margin: '0 0 6px' }}>🖼️ Muro dei Ricordi</h2>
            <p style={{ color: '#777', fontSize: 15, margin: 0 }}>Le storie di chi c'era. Ogni parola — un pezzo di storia condivisa.</p>
          </div>
          {user && (userProfile?.approved || user.email === ADMIN_EMAIL) && (
            <button onClick={() => setShowAddModal(true)} style={{ background: 'linear-gradient(135deg, #C8A000, #1B64C8)', color: '#fff', border: 'none', borderRadius: '50px', padding: '10px 22px', fontSize: 14, fontWeight: 700, cursor: 'pointer', whiteSpace: 'nowrap' }}>
              + Aggiungi ricordo
            </button>
          )}
          {user && !userProfile?.approved && (
            <div style={{ background: '#EEF4FF', border: '1px solid #C8A00044', borderRadius: '10px', padding: '8px 14px', fontSize: 13, color: '#1A4A8A' }}>
              ⏳ In attesa di approvazione
            </div>
          )}
          {!user && (
            <button onClick={() => onOpenAuth('register')} style={{ background: '#F5F9FF', color: '#0D3A6E', border: '2px solid #C8A000', borderRadius: '50px', padding: '10px 22px', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
              ✨ Aggiungi il tuo ricordo
            </button>
          )}
        </div>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 20 }}>
          {tags.map(t => (
            <button key={t} onClick={() => setFilter(t)} style={{ padding: '6px 14px', borderRadius: '20px', border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 600, background: filter === t ? '#0D3A6E' : '#F5F9FF', color: filter === t ? '#fff' : '#0D3A6E', transition: 'all 0.2s' }}>
              #{t}
            </button>
          ))}
        </div>
      </div>

      {loading ? (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: '#C8A000' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>☕</div>
          <p>Caricamento ricordi...</p>
        </div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 18 }}>
          {filtered.map(mem => {
            const colors = TAG_COLORS[mem.tag] || TAG_COLORS.altro;
            const isLiked = likedIds.includes(mem.id);
            return (
              <div key={mem.id} style={{ background: colors.bg, borderRadius: '20px', border: `2px solid ${colors.border}33`, overflow: 'hidden', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', display: 'flex', flexDirection: 'column' }}>
                {mem.photo_url ? (
                  <div onClick={() => setLightbox(mem.photo_url)} style={{ height: 180, overflow: 'hidden', position: 'relative', cursor: 'zoom-in' }}>
                    <img src={mem.photo_url} alt={mem.title} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                    <div style={{ position: 'absolute', top: 10, right: 10 }}><Tag text={mem.tag} /></div>
                  </div>
                ) : (
                  <div style={{ height: 100, background: `linear-gradient(135deg, ${colors.border}15, ${colors.border}30)`, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
                    <span style={{ fontSize: 48 }}>{mem.author_emoji || '😊'}</span>
                    <div style={{ position: 'absolute', top: 10, right: 10 }}><Tag text={mem.tag} /></div>
                  </div>
                )}
                <div style={{ padding: '16px 18px', flex: 1, display: 'flex', flexDirection: 'column' }}>
                  <h4 style={{ margin: '0 0 4px', fontSize: 15, fontWeight: 700, color: '#1A1A1A', fontFamily: 'Georgia, serif', lineHeight: 1.3 }}>{mem.title}</h4>
                  <div style={{ fontSize: 12, color: '#888', marginBottom: 10 }}>{mem.author} · {mem.date_label}</div>
                  <p style={{ fontSize: 13, color: '#444', lineHeight: 1.65, margin: '0 0 14px', flex: 1 }}>{mem.text}</p>
                  <div style={{ borderTop: `1px solid ${colors.border}22`, paddingTop: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <button onClick={() => handleLike(mem.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, color: isLiked ? '#1B64C8' : '#888', fontSize: 14, fontWeight: 600, padding: 0, transition: 'all 0.2s' }}>
                      <span style={{ fontSize: 16 }}>{isLiked ? '❤️' : '🤍'}</span>
                      <span>{mem.likes}</span>
                    </button>
                    {(user?.id === mem.author_id || user?.email === ADMIN_EMAIL) && (
                      <button onClick={async () => {
                        if (!window.confirm('Eliminare questo ricordo?')) return;
                        const res = await DB.deleteMemory(mem.id);
                        if (res.success) {
                          const mems = await DB.getMemories();
                          setMemories(mems);
                        }
                      }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#cc3333', fontSize: 13, padding: '2px 6px', borderRadius: 6, opacity: 0.6 }} title="Elimina">
                        🗑️
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Lightbox */}
      {lightbox && (
        <div onClick={() => setLightbox(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'zoom-out', padding: 20 }}>
          <img src={lightbox} style={{ maxWidth: '100%', maxHeight: '90vh', objectFit: 'contain', borderRadius: 8, boxShadow: '0 0 60px rgba(0,0,0,0.5)' }} onClick={e => e.stopPropagation()} />
          <button onClick={() => setLightbox(null)} style={{ position: 'absolute', top: 20, right: 24, background: 'none', border: 'none', color: '#fff', fontSize: 32, cursor: 'pointer', lineHeight: 1 }}>×</button>
        </div>
      )}

      {showAddModal && (
        <AddMemoryModal
          onClose={() => setShowAddModal(false)}
          onSuccess={async () => {
            const mems = await DB.getMemories();
            setMemories(mems);
          }}
          userProfile={userProfile}
          user={user}
        />
      )}
    </div>
  );
};

// ─── PAGE: ADMIN ──────────────────────────────────────────────────────────────
const PageAdmin = () => {
  const [tab, setTab] = useState('utenti');
  const [pendingUsers, setPendingUsers] = useState([]);
  const [pendingMems, setPendingMems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [msg, setMsg] = useState('');

  const load = async () => {
    setLoading(true);
    const [users, mems] = await Promise.all([DB.getPendingProfiles(), DB.getPendingMemories()]);
    setPendingUsers(users);
    setPendingMems(mems);
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const flash = (text) => { setMsg(text); setTimeout(() => setMsg(''), 3000); };

  const handleUser = async (userId, approve) => {
    const res = approve ? await DB.approveProfile(userId) : await DB.rejectProfile(userId);
    if (res.error) { flash('Errore: ' + res.error); return; }
    flash(approve ? '✅ Utente approvato!' : '🗑️ Profilo rimosso.');
    setPendingUsers(prev => prev.filter(u => u.id !== userId));
  };

  const handleMem = async (memId, approve) => {
    const res = approve ? await DB.approveMemory(memId) : await DB.rejectMemory(memId);
    if (res.error) { flash('Errore: ' + res.error); return; }
    flash(approve ? '✅ Ricordo approvato!' : '🗑️ Ricordo rimosso.');
    setPendingMems(prev => prev.filter(m => m.id !== memId));
  };

  const btnStyle = (color) => ({
    border: 'none', borderRadius: '50px', padding: '8px 18px', fontSize: 13,
    fontWeight: 700, cursor: 'pointer', color: '#fff',
    background: color === 'green' ? 'linear-gradient(135deg,#2D7A45,#3DAA60)' : 'linear-gradient(135deg,#A33,#1B64C8)'
  });

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontFamily: 'Georgia,serif', fontSize: 28, color: '#0D3A6E', margin: '0 0 4px' }}>🔑 Pannello Admin</h2>
        <p style={{ color: '#888', fontSize: 14, margin: 0 }}>Visibile solo a te, Carlo.</p>
      </div>

      {msg && (
        <div style={{ background: '#0D3A6E', color: '#D0E4FF', padding: '10px 20px', borderRadius: '50px', fontSize: 14, fontWeight: 600, marginBottom: 20, display: 'inline-block' }}>
          {msg}
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
        {[['utenti', `👥 Iscrizioni (${pendingUsers.length})`], ['ricordi', `🖼️ Ricordi (${pendingMems.length})`]].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ padding: '8px 20px', borderRadius: '50px', border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 700, background: tab === id ? '#0D3A6E' : '#F5F9FF', color: tab === id ? '#fff' : '#0D3A6E', transition: 'all 0.2s' }}>
            {label}
          </button>
        ))}
      </div>

      {loading ? (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: '#C8A000' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>⏳</div>
          <p>Caricamento...</p>
        </div>
      ) : tab === 'utenti' ? (
        pendingUsers.length === 0 ? (
          <div style={{ background: '#F0F7EF', borderRadius: '16px', padding: '32px', textAlign: 'center', border: '1px solid #1B64C844' }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>✅</div>
            <p style={{ color: '#0D3A6E', fontWeight: 600, margin: 0 }}>Nessuna iscrizione in attesa.</p>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {pendingUsers.map(u => (
              <div key={u.id} style={{ background: '#fff', borderRadius: '20px', border: '1px solid #DDE8F5', padding: '18px 22px', boxShadow: '0 2px 10px rgba(0,0,0,0.05)', display: 'flex', gap: 16, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                <Avatar emoji={u.emoji} size={50} />
                <div style={{ flex: 1, minWidth: 200 }}>
                  <div style={{ fontWeight: 700, fontSize: 16, fontFamily: 'Georgia,serif', color: '#1A1A1A', marginBottom: 4 }}>{u.name}</div>
                  <div style={{ fontSize: 13, color: '#888', marginBottom: 4 }}>
                    {[u.city, u.country].filter(Boolean).join(', ')}
                    {u.job ? ` · ${u.job}` : ''}
                    {u.years ? ` · Al Cafè: ${u.years}` : ''}
                  </div>
                  {u.bio && <p style={{ fontSize: 13, color: '#555', fontStyle: 'italic', margin: 0, lineHeight: 1.5 }}>"{u.bio.substring(0, 180)}{u.bio.length > 180 ? '...' : ''}"</p>}
                </div>
                <div style={{ display: 'flex', gap: 8, flexShrink: 0, alignSelf: 'center' }}>
                  <button onClick={() => handleUser(u.id, true)} style={btnStyle('green')}>✅ Approva</button>
                  <button onClick={() => handleUser(u.id, false)} style={btnStyle('red')}>🗑️ Rifiuta</button>
                </div>
              </div>
            ))}
          </div>
        )
      ) : (
        pendingMems.length === 0 ? (
          <div style={{ background: '#F0F7EF', borderRadius: '16px', padding: '32px', textAlign: 'center', border: '1px solid #1B64C844' }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>✅</div>
            <p style={{ color: '#0D3A6E', fontWeight: 600, margin: 0 }}>Nessun ricordo in attesa.</p>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {pendingMems.map(m => (
              <div key={m.id} style={{ background: '#fff', borderRadius: '20px', border: '1px solid #DDE8F5', padding: '18px 22px', boxShadow: '0 2px 10px rgba(0,0,0,0.05)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
                  <div style={{ flex: 1, minWidth: 200 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, fontFamily: 'Georgia,serif', color: '#1A1A1A', marginBottom: 4 }}>{m.title}</div>
                    <div style={{ fontSize: 12, color: '#C8A000', fontWeight: 600, marginBottom: 6 }}>{m.author} · {m.date_label} · #{m.tag}</div>
                    <p style={{ fontSize: 13, color: '#444', lineHeight: 1.6, margin: 0 }}>{m.text.substring(0, 250)}{m.text.length > 250 ? '...' : ''}</p>
                  </div>
                  <div style={{ display: 'flex', gap: 8, flexShrink: 0, alignSelf: 'center' }}>
                    <button onClick={() => handleMem(m.id, true)} style={btnStyle('green')}>✅ Approva</button>
                    <button onClick={() => handleMem(m.id, false)} style={btnStyle('red')}>🗑️ Rifiuta</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )
      )}
    </div>
  );
};

// ─── APP PRINCIPALE ───────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [menuOpen, setMenuOpen] = useState(false);
  const [authModal, setAuthModal] = useState(null); // null | 'login' | 'register'
  const [user, setUser] = useState(null);
  const [userProfile, setUserProfile] = useState(null);
  const [successMsg, setSuccessMsg] = useState('');
  const [showEditProfile, setShowEditProfile] = useState(false);

  const autoApproveAdmin = async (u) => {
    if (!u || !sb || u.email !== ADMIN_EMAIL) return;
    try { await sb.from("profiles").upsert({ id: u.id, name: 'Carlo', approved: true }, { onConflict: 'id' }); } catch(_) {}
    try { await sb.from("profiles").update({ approved: true }).eq("id", u.id); } catch(_) {}
  };

  useEffect(() => {
    (async () => {
      const u = await DB.getUser();
      setUser(u);
      if (u) {
        await autoApproveAdmin(u);
        const profile = await DB.getUserProfile(u.id);
        setUserProfile(profile);
      }
    })();

    // Auth state change listener
    if (sb) {
      const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
        const u = session?.user || null;
        setUser(u);
        if (u) {
          await autoApproveAdmin(u);
          const profile = await DB.getUserProfile(u.id);
          setUserProfile(profile);
        } else {
          setUserProfile(null);
        }
      });
      return () => subscription.unsubscribe();
    }
  }, []);

  const handleAuthSuccess = (type) => {
    if (type === 'register') {
      setSuccessMsg('🎉 Registrazione inviata! Carlo ti approverà presto.');
    } else {
      setSuccessMsg('☕ Bentornato nella Family!');
    }
    setTimeout(() => setSuccessMsg(''), 4000);
  };

  const handleLogout = async () => {
    await DB.logout();
    setUser(null);
    setUserProfile(null);
    setPage('home');
  };

  const isAdmin = user?.email === ADMIN_EMAIL;

  const navItems = [
    { id: 'home', label: 'Home', icon: '☕' },
    { id: 'muro', label: 'Ricordi', icon: '🖼️' },
    { id: 'mappa', label: 'Mappa', icon: '🌍' },
    { id: 'family', label: 'Family', icon: '👥' },
    ...(isAdmin ? [{ id: 'admin', label: 'Admin', icon: '🔑' }] : []),
  ];

  const renderPage = () => {
    const props = { user, userProfile, onOpenAuth: setAuthModal, onNavigate: (p) => { setPage(p); setAuthModal(p === 'login' ? 'login' : p === 'register' ? 'register' : null); } };
    switch (page) {
      case 'home': return <PageHome {...props} />;
      case 'muro': return <PageMuro {...props} />;
      case 'mappa': return <PageMappa {...props} />;
      case 'family': return <PageFamily {...props} />;
      case 'admin': return isAdmin ? <PageAdmin /> : <PageHome {...props} />;
      default: return <PageHome {...props} />;
    }
  };

  return (
    <div style={{ fontFamily: "'Segoe UI', Arial, sans-serif", background: '#F0F5FF', minHeight: '100vh' }}>
      {!CONFIGURED && <DemoBanner />}

      {/* Success toast */}
      {successMsg && (
        <div style={{ position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', background: '#0D3A6E', color: '#D0E4FF', padding: '12px 24px', borderRadius: '50px', fontSize: 14, fontWeight: 600, zIndex: 2000, boxShadow: '0 8px 24px rgba(0,0,0,0.2)', whiteSpace: 'nowrap' }}>
          {successMsg}
        </div>
      )}

      {/* Navbar */}
      <nav style={{ background: '#fff', borderBottom: '1px solid #C5D5EE', padding: '0 24px', position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 2px 12px rgba(13,58,110,0.08)' }}>
        <div style={{ maxWidth: 960, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 64 }}>
          <button onClick={() => setPage('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, padding: 0 }}>
            <img src="logo.jpg" alt="Cafè degli Artisti" style={{ width: 44, height: 44, borderRadius: '8px', objectFit: 'cover', border: '2px solid #C8A000' }} />
            <div>
              <div style={{ fontFamily: 'Georgia, serif', fontSize: 15, fontWeight: 800, color: '#0D3A6E', lineHeight: 1.1 }}>Cafè degli Artisti</div>
              <div style={{ fontSize: 10, color: '#C8A000', letterSpacing: '2px', fontWeight: 600 }}>FAMILY</div>
            </div>
          </button>

          <div className="desktop-nav" style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            {navItems.map(item => (
              <button key={item.id} onClick={() => setPage(item.id)} style={{ background: page === item.id ? '#EEF4FF' : 'none', color: page === item.id ? '#0D3A6E' : '#777', border: 'none', borderRadius: '50px', padding: '8px 14px', fontSize: 14, fontWeight: page === item.id ? 700 : 500, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, transition: 'all 0.2s' }}>
                {item.icon} {item.label}
              </button>
            ))}

            {user ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginLeft: 8 }}>
                <div onClick={() => setShowEditProfile(true)} style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#EEF4FF', borderRadius: '50px', padding: '6px 12px', fontSize: 13, color: '#0D3A6E', cursor: 'pointer' }} title="Modifica profilo">
                  <span>{userProfile?.emoji || '😊'}</span>
                  <span style={{ fontWeight: 600 }}>{userProfile?.name?.split(' ')[0] || 'Ciao'}</span>
                  <span style={{ fontSize: 10, opacity: 0.5 }}>✏️</span>
                </div>
                <button onClick={handleLogout} style={{ background: 'none', border: '1px solid #C5D5EE', borderRadius: '50px', padding: '6px 12px', fontSize: 13, color: '#888', cursor: 'pointer' }}>Esci</button>
              </div>
            ) : (
              <div style={{ display: 'flex', gap: 8, marginLeft: 8 }}>
                <button onClick={() => setAuthModal('login')} style={{ background: 'none', border: '1px solid #C5D5EE', borderRadius: '50px', padding: '8px 16px', fontSize: 14, color: '#0D3A6E', fontWeight: 600, cursor: 'pointer' }}>
                  Accedi
                </button>
                <button onClick={() => setAuthModal('register')} style={{ background: 'linear-gradient(135deg, #C8A000, #1B64C8)', color: '#fff', border: 'none', borderRadius: '50px', padding: '8px 16px', fontSize: 14, fontWeight: 700, cursor: 'pointer', boxShadow: '0 3px 12px rgba(200,160,0,0.3)' }}>
                  Entra ✨
                </button>
              </div>
            )}
          </div>

          {/* Mobile menu button */}
          <button className="mobile-menu-btn" onClick={() => setMenuOpen(!menuOpen)} style={{ display: 'none', background: 'none', border: 'none', cursor: 'pointer', fontSize: 24, color: '#0D3A6E', padding: '4px' }}>
            {menuOpen ? '✕' : '☰'}
          </button>
        </div>

        {/* Mobile menu */}
        {menuOpen && (
          <div style={{ borderTop: '1px solid #C5D5EE', padding: '12px 0', background: '#fff' }}>
            {navItems.map(item => (
              <button key={item.id} onClick={() => { setPage(item.id); setMenuOpen(false); }} style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', padding: '12px 24px', background: page === item.id ? '#EEF4FF' : 'none', border: 'none', color: page === item.id ? '#0D3A6E' : '#555', fontSize: 15, fontWeight: page === item.id ? 700 : 500, cursor: 'pointer', textAlign: 'left' }}>
                {item.icon} {item.label}
              </button>
            ))}
            <div style={{ padding: '12px 24px', borderTop: '1px solid #C5D5EE', marginTop: 8, display: 'flex', gap: 10 }}>
              {user ? (
                <button onClick={() => { handleLogout(); setMenuOpen(false); }} style={{ flex: 1, background: '#F5F9FF', border: '1px solid #C5D5EE', borderRadius: '50px', padding: '10px', fontSize: 14, color: '#0D3A6E', fontWeight: 600, cursor: 'pointer' }}>Esci</button>
              ) : (
                <>
                  <button onClick={() => { setAuthModal('login'); setMenuOpen(false); }} style={{ flex: 1, background: '#F5F9FF', border: '1px solid #C5D5EE', borderRadius: '50px', padding: '10px', fontSize: 14, color: '#0D3A6E', fontWeight: 600, cursor: 'pointer' }}>Accedi</button>
                  <button onClick={() => { setAuthModal('register'); setMenuOpen(false); }} style={{ flex: 1, background: 'linear-gradient(135deg, #C8A000, #1B64C8)', color: '#fff', border: 'none', borderRadius: '50px', padding: '10px', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>Entra ✨</button>
                </>
              )}
            </div>
          </div>
        )}
      </nav>

      {/* Main content */}
      <main style={{ maxWidth: 960, margin: '0 auto', padding: '28px 20px 80px' }}>
        {renderPage()}
      </main>

      {/* Footer */}
      <footer style={{ background: '#0D3A6E', color: 'rgba(255,255,255,0.7)', textAlign: 'center', padding: '28px 20px', fontSize: 13 }}>
        <div style={{ fontFamily: 'Georgia, serif', fontSize: 17, color: '#D0E4FF', marginBottom: 8 }}>Cafè degli Artisti – Family</div>
        <div style={{ marginBottom: 6 }}>Vietri sul Mare, Costiera Amalfitana · 1990–2005 · Sempre</div>
        <div style={{ fontSize: 12, opacity: 0.5, marginTop: 8, fontStyle: 'italic' }}>"Una specie di calore collettivo, silenzioso e contagioso."</div>
      </footer>

      {/* Auth Modal */}
      {authModal && (
        <AuthModal
          mode={authModal}
          onClose={() => setAuthModal(null)}
          onSuccess={handleAuthSuccess}
        />
      )}

      {/* Edit Profile Modal */}
      {showEditProfile && user && (
        <EditProfileModal
          user={user}
          userProfile={userProfile}
          onClose={() => setShowEditProfile(false)}
          onSaved={async () => {
            const profile = await DB.getUserProfile(user.id);
            setUserProfile(profile);
          }}
        />
      )}
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
